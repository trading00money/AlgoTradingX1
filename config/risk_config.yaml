# ================================================================
# GANN QUANT AI - RISK MANAGEMENT CONFIGURATION v3.0
# ================================================================
# Comprehensive risk management system
# Based on 20 years of institutional trading experience
# ================================================================

version: "3.0.0"

# ================================================================
# ACTIVE RUNTIME PARAMETERS (flat keys read by RiskManager + PortfolioManager)
# ================================================================
# RiskManager reads these via self.config.get("key", default).
# The nested sections below are documentation/reference only —
# they are NOT read by the engine. These flat keys ARE.
# ================================================================

# Seasonal position-size filter ──────────────────────────────────────────────
# Walk-forward analysis (16 folds, 2022-2026) shows all 4 FAIL folds fall in
# Apr-Oct: folds 2 (Apr-Jul 2022), 6 (Apr-Jul 2023), 7 (Jul-Oct 2023),
# 14 (May-Aug 2025).  Q2/Q3 XAUUSD behaviour is range-bound with low
# follow-through — ATR-based stops/targets widen but price doesn't commit,
# compressing realised RR and turning positive-expectancy signals into losers.
# Fix: scale position size DOWN to seasonal_size_scale during weak months.
# The strategy still trades (signal diversity preserved), but risk exposure
# drops to 25% of normal, capping seasonal drawdowns without a full blackout.
seasonal_filter_enabled: true
seasonal_weak_months: [4, 5, 6, 7, 8, 9]  # April through September (Q2/Q3)
seasonal_size_scale: 0.25                  # 25% of normal size in weak months

# Seasonal ADX entry gate: blocks entries ENTIRELY during weak months when
# ADX (Average Directional Index) is below threshold.  ADX < 20 means no
# directional trend — the strategy's trend-following signals fire into chop
# and produce deeply negative Sharpe (folds 2, 6: Apr-Jul 2022/2023).
# This is a hard gate (no entry), not a soft filter (reduced size).
seasonal_adx_gate_enabled: true
seasonal_adx_threshold: 20.0               # ADX must be ≥ 20 to enter during weak months

# MA trend direction filter ──────────────────────────────────────────────────
# Year-round filter: blocks long entries when close < MA(period) and short
# entries when close > MA(period).  Prevents the strategy from fighting macro
# trend reversals (e.g. Apr-Jul 2022 gold crash where ADX was high but the
# market was in a strong downtrend driven by Fed rate hikes).  The ADX gate
# alone can't catch this because the market WAS trending — just against longs.
trend_filter_enabled: true
trend_filter_period: 200                   # 200 × 1H bars ≈ 8 trading days; responsive medium-term trend

# Stop loss: use ATR-based stops, not fixed percentage
stop_loss_method: "atr"       # "atr" | "percentage"
atr_period: 14
atr_multiplier: 3.0           # Stop = 3.0 × ATR — walk-forward selected 7/16 folds

# Volatility-adaptive SL: scale multiplier down during high-vol regimes
# Prevents outsized dollar-losses when ATR spikes (e.g. 2021-2022 rate hikes)
vol_adaptive_sl: true
vol_adaptive_percentile: 70    # Start scaling down above 70th ATR percentile
vol_adaptive_min_multiplier: 1.5  # Floor multiplier at extreme vol
max_sl_distance: 100.0         # Hard cap: max $100/oz SL distance for gold

# High-vol entry filter: require ADX>25 when ATR>80th percentile
# Toggle ON for 5yr MT5 test if vol-adaptive SL alone isn't enough
high_vol_adx_filter: false

# Take profit: RR ratio applied to the risk distance
take_profit_method: "rr_ratio"
risk_reward_ratio: 5.0        # v5: high TP ceiling + regime exit is correct framework
                               # RR=3.0 tested: PF dropped 1.96→1.68 (regime exits lost value)
                               # Regime exit captures +3-4R sweet spot; 5R TP is ceiling only

# Breakeven stop: move SL to entry+buffer after reaching activation_r
# DISABLED: on 5yr MT5, cuts avg_win more than avg_loss (PF 1.90→1.83)
breakeven_stop_enabled: false
breakeven_activation_r: 1.0
# 0.3R buffer (≈ $75 on a $250 XAUUSD risk unit) keeps the stop clear of normal
# bar noise on gold. 0.1R was too tight — regular retracements hit BE before price
# could resume toward full TP, cutting winners prematurely.
breakeven_buffer_r: 0.3

# Trailing stop (backtester reads these directly)
# Time stop: exit trades that stagnate (haven't reached min_r within N bars)
# Catches sideways losers early, reducing avg_loss significantly
time_stop_enabled: true
time_stop_bars: 30             # 30 H1 bars ≈ 1.25 trading days
time_stop_min_r: 0.0           # Cut any trade still underwater after 30 bars
                               # Targets: converting SL losses (-$1,758) to smaller time stop losses

trailing_stop_enabled: false   # Tested on MT5 5yr: hurts PF at all settings tested
trailing_atr_multiplier: 3.0
trailing_activation_r: 1.0

# Position sizing (PortfolioManager)
sizing_method: "fixed_fractional"
risk_percentage: 1.0           # Risk 1% of equity per trade
                               # Lower = more trades survive drawdown periods

# Vol-adaptive position sizing: reduce size during high-vol regimes
# DISABLED: on 5yr MT5, reduces avg_win more than avg_loss (-18% vs -15%)
vol_adaptive_sizing: false
vol_sizing_percentile: 70
vol_sizing_min_scale: 0.5

# Smart regime exit: only close trade on regime change if unrealized R < threshold
# null/absent = legacy (always exit). Tested 0.0 and 1.0: both hurt PF.
# regime_exit_min_r: null  # disabled — legacy regime exit is correct

# Short-side regime filter: disabled — filtering by regime < 0 actually worsened
# short PF (1.45 → 1.29) because it removed neutral-regime shorts that were
# profitable and left only high-volatility bearish ones with lower avg win.
short_regime_filter_enabled: false

# Short-side asymmetric sizing: risk only short_size_scale × normal risk on
# short trades.  Keeps shorts in the mix (they add diversification and some
# alpha) while limiting their drag on the overall equity curve.
# 0.5 = half the normal 1% risk → effectively 0.5% risk per short trade.
short_size_scale: 0.5

# Partial profit exit: close partial_exit_pct of the position when unrealized
# profit reaches partial_exit_r × initial risk, then move stop to breakeven.
# Converts stalled winners into locked-in gains instead of regime-exit losses.
# partial_exit_pct = 0.5 means close 50% at 2R, let the other 50% run to TP/SL.
partial_exit_enabled: true
# 3.0R trigger: at a 5R TP target, 2R is too early — the trade hasn't cleared
# the halfway mark and partial exits were cannibalising the best winners.
# 3R = 60% of the way to TP; enough confirmation the trade is working.
partial_exit_r: 3.0        # Close partial position at 3R unrealized profit (was 2.0)
partial_exit_pct: 0.5      # Close 50% of position at trigger
partial_exit_move_be: true # Move remaining stop to breakeven after partial exit

# ================================================================
# POSITION SIZING
# ================================================================
position_sizing:
  
  # Primary method
  method: "kelly_criterion"  # kelly_criterion | fixed_percent | volatility_adjusted | optimal_f
  
  # Fixed percentage method
  fixed_percent:
    enabled: true
    risk_per_trade: 0.02  # 2% of account per trade
    
    # Adjustments by win rate
    adjustments:
      win_rate_high: 0.03  # 3% if win rate > 60%
      win_rate_low: 0.01   # 1% if win rate < 45%
      
  # Kelly Criterion
  kelly:
    enabled: true
    
    # Classic Kelly formula: f* = (bp - q) / b
    # f* = fraction of capital to risk
    # b = odds received (reward/risk ratio)
    # p = probability of winning
    # q = probability of losing (1-p)
    
    calculation:
      win_rate: "dynamic"  # dynamic | fixed
      reward_risk: "per_trade"
      
    # Kelly fraction adjustments
    fraction:
      full_kelly: 1.0
      half_kelly: 0.5  # Recommended for volatility
      quarter_kelly: 0.25  # Conservative
      
    # Active fraction
    active_fraction: 0.5  # Use half-Kelly for safety
    
    # Constraints
    constraints:
      max_position_size: 0.05  # Max 5% per trade
      min_position_size: 0.01  # Min 1% per trade
      
  # Volatility-adjusted sizing
  volatility_adjusted:
    enabled: true
    
    # ATR-based position sizing
    atr:
      enabled: true
      period: 14
      multiplier: 2.0
      
    # Calculate position size to risk fixed $ amount
    # Position Size = Risk Amount / (ATR * multiplier)
    
    risk_amount:
      method: "percent_of_equity"  # percent_of_equity | fixed_dollars
      percent: 0.02  # 2% of equity
      
  # Optimal F (Ralph Vince)
  optimal_f:
    enabled: false
    calculation_period: 100  # trades

# ================================================================
# STOP LOSS MANAGEMENT
# ================================================================
stop_loss:
  
  # Stop loss types
  types:
    
    # Fixed stop loss
    fixed:
      enabled: true
      pips: 50
      percent: 2.0
      
    # ATR-based stop (XAUUSD M15 optimized)
    # Stop at 1.5x ATR, target at 4.5x ATR → implied RR = 3:1 minimum.
    # Previous 2.0x ATR stop with 2.0x ATR target = 1:1 RR → PF<1 guaranteed.
    atr_based:
      enabled: true
      multiplier: 1.5      # Tightened from 2.0: tighter stop = larger position for same $ risk
      period: 14
      min_distance_pips: 15  # Adjusted from 20 for M15 gold granularity
      
    # Support/Resistance based
    sr_based:
      enabled: true
      buffer_pips: 5  # Place stop X pips beyond S/R
      
    # Gann level based
    gann_based:
      enabled: true
      use_nearest_level: true
      buffer_pips: 3
      
    # Volatility percentile
    volatility_based:
      enabled: true
      percentile: 80  # Use 80th percentile of recent volatility
      lookback: 50
      
  # Trailing stop
  trailing:
    enabled: true
    
    # Trailing methods
    methods:
      
      # Fixed trailing stop
      fixed:
        enabled: true
        distance_pips: 30
        activation_profit_pips: 50
        
      # ATR trailing
      atr:
        enabled: true
        multiplier: 2.5
        activation_profit_atr: 2.0
        
      # Parabolic SAR
      parabolic_sar:
        enabled: true
        acceleration: 0.02
        maximum: 0.2
        
      # Chandelier exit
      chandelier:
        enabled: true
        atr_multiplier: 3.0
        period: 22
        
  # Stop loss adjustment
  adjustment:
    breakeven:
      enabled: true
      trigger_profit_pips: 30
      lock_in_pips: 5
      
    profit_milestones:
      enabled: true
      milestones:
        - profit_pips: 50
          move_stop_to: 25
        - profit_pips: 100
          move_stop_to: 60
        - profit_pips: 150
          move_stop_to: 100
          
  # Time-based stop
  time_stop:
    enabled: true
    max_hold_hours: 72  # Exit after 72 hours regardless
    weekend_close: true  # Close before weekend

# ================================================================
# TAKE PROFIT MANAGEMENT
# ================================================================
take_profit:
  
  # Take profit methods
  methods:
    
    # Fixed R:R ratio
    fixed_rr:
      enabled: true
      ratio: 3.0  # 3:1 reward:risk
      
    # Multiple targets
    scaled_exits:
      enabled: true
      
      targets:
        - percent: 33  # Close 33% at target 1
          rr_ratio: 2.0
          
        - percent: 33  # Close 33% at target 2
          rr_ratio: 3.0
          
        - percent: 34  # Close remaining at target 3
          rr_ratio: 5.0
          
    # Resistance-based
    resistance_based:
      enabled: true
      use_gann_levels: true
      use_fibonacci: true
      buffer_pips: -3  # Exit before resistance
      
    # ATR-based targets (paired with 2.0x ATR stop → RR = 3.5:1, 5:1, 7:1)
    atr_based:
      enabled: true
      targets:
        - multiplier: 7.0   # T1: 3.5R exit (stop=2×ATR, target=7×ATR)
          percent: 40
        - multiplier: 10.0  # T2: 5R exit
          percent: 35
        - multiplier: 14.0  # T3: runner to 7R
          percent: 25
          
  # Profit protection
  protection:
    
    # Lock profit after X% gain
    lock_profit:
      enabled: true
      trigger_percent: 2.0  # After 2% gain
      lock_percent: 1.0     # Lock in 1% minimum
      
    # Trailing take profit
    trailing_tp:
      enabled: true
      activation_profit: 2.0  # R
      trail_by: 0.5  # Trail by 0.5R

# ================================================================
# RISK LIMITS
# ================================================================
risk_limits:
  
  # Per-trade limits
  per_trade:
    max_risk_percent: 0.05  # Max 5% risk per trade
    max_position_size: 0.10  # Max 10% of capital in one position
    
  # Daily limits
  daily:
    max_loss_percent: 0.05  # Stop trading after -5% daily loss
    max_loss_dollars: 5000
    max_trades: 10
    max_risk_exposure: 0.15  # Max 15% total risk exposure
    
  # Weekly limits
  weekly:
    max_loss_percent: 0.10  # -10% weekly loss limit
    max_consecutive_losses: 5
    
  # Monthly limits
  monthly:
    max_loss_percent: 0.15  # -15% monthly loss limit
    max_drawdown_percent: 0.20  # -20% drawdown limit
    
  # Position limits
  positions:
    max_open_positions: 5
    max_correlated_positions: 2  # Max positions in correlated instruments
    max_per_asset_class: 3
    
  # Leverage limits
  leverage:
    max_leverage: 10
    
    # By asset class
    by_asset:
      forex: 100
      crypto: 10
      stocks: 5
      indices: 50
      commodities: 50

# ================================================================
# CORRELATION MANAGEMENT
# ================================================================
correlation:
  
  enabled: true
  
  # Correlation calculation
  calculation:
    method: "pearson"  # pearson | spearman
    period: 50  # bars
    update_frequency: "daily"
    
  # Correlation matrix
  matrix:
    calculate: true
    instruments: "all_active"
    
  # Position adjustment
  adjustment:
    enabled: true
    
    # Reduce position size for highly correlated trades
    high_correlation_threshold: 0.7
    size_reduction: 0.5  # Reduce by 50%
    
    # Avoid highly correlated positions
    avoid_threshold: 0.85
    
  # Hedge detection
  hedge:
    detect_natural_hedges: true
    allow_hedged_positions: true

# ================================================================
# VOLATILITY FILTERING
# ================================================================
volatility:
  
  # Volatility calculation
  calculation:
    method: "atr"  # atr | stddev | parkinson
    period: 14
    
  # Volatility regimes
  regimes:
    enabled: true
    
    low:
      threshold_percentile: 33
      max_position_size: 0.04  # 4%
      min_rr: 2.5
      
    normal:
      threshold_percentile: [33, 66]
      max_position_size: 0.03  # 3%
      min_rr: 2.0
      
    high:
      threshold_percentile: 66
      max_position_size: 0.02  # 2%
      min_rr: 3.0
      
  # Volatility filters
  filters:
    min_volatility: 0.5  # Avoid dead markets
    max_volatility: 3.0  # Avoid crazy markets
    
    # Adjust stops for volatility
    volatility_stops: true

# ================================================================
# DRAWDOWN MANAGEMENT
# ================================================================
drawdown:
  
  # Drawdown tracking
  tracking:
    enabled: true
    calculate_realtime: true
    
    types:
      - "absolute"  # From peak equity
      - "relative"  # Percentage from peak
      - "maximum"   # Largest historical DD
      
  # Drawdown limits
  limits:
    warning_level: 0.10  # Warning at -10%
    critical_level: 0.15  # Critical at -15%
    max_level: 0.20      # Stop at -20%
    
  # Recovery rules
  recovery:
    enabled: true
    
    # Reduce risk during drawdown
    risk_reduction:
      enabled: true
      at_10_percent: 0.5  # Reduce risk by 50%
      at_15_percent: 0.25  # Reduce risk by 75%
      
    # Pause trading during severe drawdown
    pause_trading:
      enabled: true
      threshold: 0.15
      cooldown_days: 7
      
    # Recovery mode
    recovery_mode:
      enabled: true
      gradual_increase: true
      increase_after_wins: 3

# ================================================================
# MARKET CONDITION FILTERS
# ================================================================
market_filters:
  
  # Spread filter
  spread:
    enabled: true
    max_spread_pips: 3.0
    max_spread_percent: 0.1
    
  # Liquidity filter
  liquidity:
    enabled: true
    min_volume: 1000
    avoid_thin_markets: true
    
  # News filter
  news:
    enabled: true
    avoid_high_impact: true
    buffer_minutes: 30
    
  # Market hours filter
  hours:
    enabled: true
    preferred_sessions: ["london", "new_york"]
    avoid_asian_session: false
    
  # Trend filter
  trend:
    enabled: true
    min_adx: 25  # Avoid choppy markets
    
  # Market regime
  regime:
    enabled: true
    detect_regime: true
    
    regimes:
      trending:
        strategy_adjustments:
          increase_targets: 1.2
          wider_stops: 1.1
          
      ranging:
        strategy_adjustments:
          reduce_targets: 0.8
          tighter_stops: 0.9
          mean_reversion: true
          
      volatile:
        strategy_adjustments:
          reduce_size: 0.5
          wider_stops: 1.5
          higher_rr: 3.0

# ================================================================
# EXPOSURE MANAGEMENT
# ================================================================
exposure:
  
  # Total exposure limits
  total:
    max_gross_exposure: 0.30  # 30% of capital at risk
    max_net_exposure: 0.20     # 20% directional exposure
    
  # By asset class
  by_asset_class:
    forex:
      max_exposure: 0.15
      max_positions: 3
      
    crypto:
      max_exposure: 0.10
      max_positions: 2
      
    indices:
      max_exposure: 0.15
      max_positions: 3
      
    commodities:
      max_exposure: 0.10
      max_positions: 2
      
  # By currency
  by_currency:
    enabled: true
    max_per_currency: 0.15  # Max 15% exposure to single currency
    
  # Sector exposure (stocks)
  by_sector:
    enabled: true
    max_per_sector: 0.20

# ================================================================
# PORTFOLIO HEAT
# ================================================================
portfolio_heat:
  
  enabled: true
  
  # Heat calculation
  calculation:
    method: "sum_of_risks"  # sum_of_risks | variance_adjusted
    
  # Heat limits
  limits:
    max_portfolio_heat: 0.12  # 12% total risk
    warning_level: 0.10
    
  # Heat reduction
  reduction:
    auto_reduce: true
    reduce_newest: true  # Close newest positions first
    reduce_worst: false  # vs close worst performing

# ================================================================
# ACCOUNT PROTECTION
# ================================================================
account_protection:
  
  # Equity protection
  equity:
    min_equity_percent: 0.80  # Never drop below 80% of peak
    
  # Consecutive losses
  consecutive_losses:
    max_count: 5
    action: "pause_trading"
    cooldown_hours: 24
    
  # Win rate monitoring
  win_rate:
    min_acceptable: 0.35   # 35% minimum (achievable with raised signal filters)
    evaluation_period: 20  # Reduced from 30: detect problems faster on M15
    action_below_min: "pause_trading"  # Changed from reduce_size: stop entirely below floor

  # Profit factor
  profit_factor:
    min_acceptable: 1.5    # Keep as early warning
    target: 2.0            # Added explicit target
    evaluation_period: 30  # Reduced from 50: faster feedback loop
    
  # Circuit breaker
  circuit_breaker:
    enabled: true
    
    triggers:
      - rapid_loss: -0.03  # -3% in 1 hour
      - daily_limit: -0.05
      - technical_error: true
      
    action: "close_all_positions"
    manual_restart_required: true

# ================================================================
# RISK REPORTING
# ================================================================
reporting:
  
  # Real-time monitoring
  realtime:
    enabled: true
    update_frequency: 60  # seconds
    
    metrics:
      - "current_exposure"
      - "portfolio_heat"
      - "daily_pnl"
      - "open_positions"
      - "available_margin"
      
  # Daily reports
  daily:
    enabled: true
    time: "17:00"  # UTC
    
    include:
      - "risk_metrics"
      - "position_summary"
      - "pnl_breakdown"
      - "limit_utilization"
      
  # Alerts
  alerts:
    enabled: true
    
    alert_on:
      - "limit_breach"
      - "high_exposure"
      - "large_loss"
      - "margin_warning"
      - "correlation_spike"
      
    channels: ["telegram", "email", "webhook"]

# ================================================================
# KELLY CRITERION ADVANCED
# ================================================================
kelly_advanced:
  
  # Dynamic Kelly calculation
  dynamic:
    enabled: true
    recalculate_frequency: "per_trade"
    
    # Inputs
    win_rate:
      method: "rolling"  # rolling | expanding | fixed
      period: 50  # last 50 trades
      min_trades: 20
      
    avg_win_loss:
      method: "rolling"
      period: 50
      outlier_removal: true
      
  # Kelly adjustments
  adjustments:
    
    # Reduce Kelly for uncertainty
    confidence_adjustment:
      enabled: true
      low_confidence_multiplier: 0.25
      high_confidence_multiplier: 0.75
      
    # Account for black swan events
    tail_risk:
      enabled: true
      reduction_factor: 0.20  # Reduce Kelly by 20% for tail risk

# ================================================================
# XAGUSD (Silver) - SYMBOL-SPECIFIC RISK OVERRIDES
# ================================================================
# These settings apply ONLY to XAGUSD. The XAUUSD flat keys above
# remain unchanged and continue to govern gold trading.
#
# Silver-specific rationale:
#   - Higher relative volatility (~25-30% annualised vs gold 15-18%)
#   - More erratic intraday moves → needs wider ATR multiplier
#   - Strong mean-reversion on sub-daily → shorter time stop horizon
#   - Lower absolute price ($30 vs $3800) but larger lot size (5000 oz)
#   - Gold/silver correlation ~0.85 → position sizing must account for
#     combined exposure when trading both simultaneously
#   - Seasonal patterns differ: silver weakest Jun-Aug (industrial slowdown),
#     not the broader Apr-Sep window that plagues gold
# ================================================================
# v4: "Mirror Gold" — align with XAUUSD proven parameters.
# v1-v3 tried silver-specific tweaks (regime gating, lower RR, tighter
# time stops) but regime exits averaged -$38 while gold's average +$179.
# Root cause: gold uses legacy regime exit + RR 5.0 + partial at 3.0R,
# and trades accumulate enough profit BEFORE the flip.  ATR-based stops
# already auto-adapt to silver's higher volatility, so most "silver-
# specific" adjustments were fighting the instrument, not helping it.
# v4 mirrors gold except where instrument physics demands a difference.
# ================================================================
symbols:
  XAGUSD:

    # Seasonal position-size filter ────────────────────────────────────────────
    # Silver's weak months differ from gold: industrial demand drops in summer,
    # plus Dec tax-loss selling.  These ARE genuinely different from gold's
    # Apr-Sep window, so we keep silver-specific months.
    seasonal_filter_enabled: true
    seasonal_weak_months: [4, 5, 6, 7, 8, 9]   # v6: mirror gold — Apr-Sep (shared macro sensitivity)
    seasonal_size_scale: 0.10                 # v7: 10% of normal size in weak months (aggressive filter)

    # Seasonal ADX entry gate ──────────────────────────────────────────────────
    # Mirror gold: ADX ≥ 20 during weak months.  The 22 threshold in v1-v3
    # filtered too many entries without improving win rate.
    seasonal_adx_gate_enabled: true
    seasonal_adx_threshold: 20.0              # v4: aligned with gold (was 22)

    # MA trend direction filter ────────────────────────────────────────────────
    # Mirror gold: 200-bar MA.  The 150-bar in v1-v3 whipsawed on silver's
    # noisy price action, generating false trend signals.
    trend_filter_enabled: true
    trend_filter_period: 250                  # v11: 250 protects short PF (1.37 vs 1.21 at 200)

    # Stop loss: ATR-based ─────────────────────────────────────────────────────
    # Mirror gold: 3.0× ATR.  ATR itself already scales to silver's higher
    # absolute volatility.  The 3.5× in v1-v3 made risk-per-trade too large,
    # reducing position sizes and compressing returns.
    stop_loss_method: "atr"
    atr_period: 14
    atr_multiplier: 3.0                       # v6: reverted to gold — 2.5 caused too many SL without PF gain

    # Volatility-adaptive SL ───────────────────────────────────────────────────
    # Mirror gold: same percentile and floor.  ATR already captures silver's
    # higher baseline vol — no need for a separate percentile threshold.
    vol_adaptive_sl: true
    vol_adaptive_percentile: 70               # v4: aligned with gold (was 75)
    vol_adaptive_min_multiplier: 1.5          # v4: aligned with gold (was 2.0)
    max_sl_distance: 3.0                      # Silver-specific: $3/oz cap (gold: $100/oz)

    # High-vol entry filter — require ADX>25 when ATR>80th pctile
    # Silver's volatile periods produce choppy entries; this gates them
    high_vol_adx_filter: true                  # v9: enabled for silver (disabled for gold)

    # Take profit ──────────────────────────────────────────────────────────────
    # v4: RR 5.0 mirrors gold.  Gold's key insight: RR=5.0 is a CEILING, not
    # a target.  Most trades exit via regime change (at +$179 avg on gold).
    # The high ceiling lets partial exits capture 3.0R and runners occasionally
    # hit 5R.  Lowering RR to 3.0 (v2-v3) forced TP exits too early and
    # compressed the average win.
    take_profit_method: "rr_ratio"
    risk_reward_ratio: 5.0                    # v4: aligned with gold (was 3.0)

    # Breakeven stop ───────────────────────────────────────────────────────────
    # v4: disabled — mirrors gold.  Gold tested BE and it cut avg_win more
    # than avg_loss (PF 1.90→1.83).  Same dynamic applies to silver: BE at
    # 1.5R was stopping out trades that needed room to reach partial/TP.
    breakeven_stop_enabled: false             # v4: disabled (was true in v3)
    breakeven_activation_r: 1.0
    breakeven_buffer_r: 0.3

    # Time stop ────────────────────────────────────────────────────────────────
    # v4: 30 bars mirrors gold.  The 18-bar time stop in v2-v3 was cutting
    # silver trades before they had time to develop.  Silver trends may be
    # shorter than gold's, but 18 H1 bars (< 1 day) is too aggressive.
    # 30 bars ≈ 1.25 days gives trends adequate time to prove themselves.
    time_stop_enabled: true
    time_stop_bars: 30                        # v6: reverted to gold — give trends time to develop
    time_stop_min_r: 0.0                      # Cut any trade still underwater

    # Trailing stop
    trailing_stop_enabled: false
    trailing_atr_multiplier: 3.0
    trailing_activation_r: 1.0

    # Position sizing ──────────────────────────────────────────────────────────
    # v4: 1.0% mirrors gold.  The 0.75% in v1-v3 directly reduced returns by
    # 25%.  ATR-based stops already control dollar risk; the fractional sizing
    # percentage should match gold for comparable return profiles.
    sizing_method: "fixed_fractional"
    risk_percentage: 1.5                      # v10: boost returns — silver needs larger sizing to approach gold

    # Vol-adaptive position sizing — reduce size during high-vol regimes
    # Silver's worst DD occurs during volatile chop; scaling down targets DD
    vol_adaptive_sizing: true                  # v12: enabled to reduce DD during high-vol
    vol_sizing_percentile: 70
    vol_sizing_min_scale: 0.5

    # Smart regime exit ────────────────────────────────────────────────────────
    # v4: DISABLED — use legacy regime exit (always exit on regime change),
    # exactly like gold.  Gold's regime exits average +$179 because trades
    # accumulate profit before the flip.  v1-v3 tried gating regime exits
    # (0.5R, then 1.0R) but this kept silver trades alive through noisy
    # transitions where the trend really WAS changing — resulting in avg -$38
    # to -$66.  The correct fix is letting the higher RR ceiling and partial
    # exits build profit, then trust the regime signal.
    regime_exit_min_r: 0.5                    # v15: optimum — 0.3-0.4 too loose, 0.6+ too tight

    # Short-side regime filter
    short_regime_filter_enabled: false

    # Short-side sizing ────────────────────────────────────────────────────────
    # v4: 0.5 mirrors gold.  Gold's short PF is 1.65 with 0.5 scale.  The
    # 0.25 scale in v2-v3 cut short exposure so much that even profitable
    # shorts contributed negligible alpha.  With the full gold framework
    # (RR 5.0, partial at 3.0R, legacy regime exit), short quality should
    # improve enough to justify 0.5x sizing.
    short_size_scale: 0.3                     # v9: re-enable — shorts provide DD diversification

    # Partial profit exit ──────────────────────────────────────────────────────
    # v4: 3.0R trigger mirrors gold.  At RR=5.0, 3.0R = 60% of target —
    # the same proportional sweet spot that works for gold.  The 2.0R trigger
    # in v2-v3 was paired with RR=3.0 (67%), but at a much lower absolute
    # profit level.  3.0R partial exits should average significantly higher
    # per-exit profit.
    partial_exit_enabled: true
    partial_exit_r: 2.5                       # v10: earlier partials → more frequent locked-in profits
    partial_exit_pct: 0.5                     # Close 50% of position
    partial_exit_move_be: true                # Move remaining stop to breakeven

    # ── Multi-symbol exposure guard ───────────────────────────────────────────
    multi_symbol:
      max_combined_precious_metals_risk: 1.5
      correlation_with_xauusd: 0.85
      max_concurrent_same_direction: 1